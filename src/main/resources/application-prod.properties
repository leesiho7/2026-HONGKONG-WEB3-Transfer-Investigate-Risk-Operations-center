# ── Railway 프로덕션 설정 ─────────────────────────────────────────────────
# 이 파일의 값들은 Railway 대시보드 > Variables 에서 설정합니다.

# ── Server ───────────────────────────────────────────────────────────────
# Railway가 PORT 환경변수를 자동 주입 (Procfile에서 -Dserver.port=$PORT 로 처리)

# ── Database (Railway MySQL Plugin) ──────────────────────────────────────
# Railway MySQL 플러그인 추가 시 아래 환경변수가 자동으로 생성됩니다:
#   MYSQLHOST / MYSQLPORT / MYSQLDATABASE / MYSQLUSER / MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── OKLink API ───────────────────────────────────────────────────────────
# Railway Variables 에서 OKLINK_API_KEY 로 설정
oklink.api.key=${OKLINK_API_KEY}
oklink.api.base-url=https://www.oklink.com

# ── QuickNode ────────────────────────────────────────────────────────────
# Railway Variables 에서 QUICKNODE_ENDPOINT 로 설정
quicknode.ethereum.endpoint=${QUICKNODE_ENDPOINT}

# ── Whale ────────────────────────────────────────────────────────────────
whale.eth.threshold=1000
whale.demo.enabled=false

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true
