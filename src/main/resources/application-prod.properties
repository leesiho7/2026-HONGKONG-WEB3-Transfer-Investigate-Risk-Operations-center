# ══════════════════════════════════════════════════════════════════════════
# Railway 프로덕션 설정
# - SPRING_PROFILES_ACTIVE=prod  를 Railway Variables에 설정하면 이 파일이 활성화됩니다.
# - MySQL 변수는 Railway MySQL 플러그인이 자동 생성합니다.
# ══════════════════════════════════════════════════════════════════════════

# ── Server ───────────────────────────────────────────────────────────────
# Procfile 에서 -Dserver.port=$PORT 로 주입됨 (여기서 별도 설정 불필요)

# ── Database ─────────────────────────────────────────────────────────────
# Railway MySQL 플러그인이 MYSQL_HOST / MYSQL_PORT / MYSQL_DATABASE /
# MYSQL_USER / MYSQL_PASSWORD 변수를 자동으로 주입합니다.
# (구버전 플러그인은 MYSQLHOST 형태일 수 있어 두 가지 모두 fallback 처리)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:localhost}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:monitoring}}?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:${MYSQLUSER:root}}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Dialect 자동감지 실패 방지 — JDBC 연결 전에 명시적으로 지정
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# HikariCP 커넥션 풀 (Railway 무료 플랜 메모리 제한 대응)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ── OKLink API ───────────────────────────────────────────────────────────
# Railway Variables 에서 OKLINK_API_KEY 설정 (미설정 시 빈 문자열 → API 호출 실패해도 앱은 기동)
oklink.api.key=${OKLINK_API_KEY:}
oklink.api.base-url=https://www.oklink.com

# ── QuickNode ────────────────────────────────────────────────────────────
# Railway Variables 에서 QUICKNODE_ENDPOINT 설정 (미설정 시 Cloudflare 공개 RPC fallback)
quicknode.ethereum.endpoint=${QUICKNODE_ENDPOINT:https://cloudflare-eth.com}

# ── Whale ────────────────────────────────────────────────────────────────
whale.eth.threshold=1000
whale.demo.enabled=false

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ── 스케줄러 활성화 ──────────────────────────────────────────────────────
spring.task.scheduling.pool.size=3

# ── Tomcat 스레드풀 (기본 200 → 20으로 축소) ─────────────────────────────
# 기본 200스레드 × 512KB 스택 = ~100MB off-heap 예약 낭비
# 웹훅 수신 + 대시보드 조회 규모엔 20개로 충분
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=4

# ── Hibernate Query Plan Cache 상한 ──────────────────────────────────────
# 기본 무제한 성장 방지 — JPQL 쿼리 수 기준 256개면 이 앱엔 충분
spring.jpa.properties.hibernate.query.plan_cache_max_size=256

# ── Arkham Intelligence API ──────────────────────────────────────────────
# Railway Variables 에서 ARKHAM_API_KEY 설정 권장 (하드코딩 금지)
arkham.api.key=${ARKHAM_API_KEY:713a0a54-f134-48ce-a3d5-df229649ad8e}
arkham.api.base-url=https://api.arkhamintelligence.com

# ── Caffeine Cache (Arkham API 응답 캐싱) ────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=600s

# ── Redis (웹훅 큐잉) ─────────────────────────────────────────────────────
# Railway Redis 플러그인이 REDISHOST / REDISPORT / REDISPASSWORD 를 자동 주입
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.timeout=5000ms

# ── Whale Executor (ThreadPoolTaskExecutor) ──────────────────────────────
whale.executor.core-pool-size=4
whale.executor.max-pool-size=8
whale.executor.queue-capacity=200

# ── QuickNode Stream Webhook ─────────────────────────────────────────────
# Destination URL (QuickNode 대시보드 설정값):
#   POST https://calm-elegance-production.up.railway.app/api/webhook/quicknode/eth
# Health 확인:
#   GET  https://calm-elegance-production.up.railway.app/api/webhook/quicknode/health
