spring.application.name=RiskOperationCenter
server.port=8095

# ── Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/monitoring?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── OKLink API ───────────────────────────────────────────────────────────
oklink.api.key=your_oklink_api_key_here
oklink.api.base-url=https://www.oklink.com
oklink.api.path.address-summary=/api/v5/explorer/address/address-summary
oklink.api.path.risk-score=/api/v5/explorer/address/entity-risk-score

# ── QuickNode (Ethereum Only) ────────────────────────────────────────────
quicknode.ethereum.endpoint=https://alien-morning-sheet.quiknode.pro/77795dcd40bf6eb8a57269edcfc54ad4b8dd54ea/

# ── Whale Filter Threshold (ETH Only) ───────────────────────────────────
whale.eth.threshold=1000

# ── QuickNode Stream Webhook 설정 ────────────────────────────────────────
# QuickNode Stream Destination URL (ngrok 터널 사용):
#   POST https://<ngrok-url>/api/webhook/quicknode/eth
# Health 확인:
#   GET  https://<ngrok-url>/api/webhook/quicknode/health

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
