spring.application.name=RiskOperationCenter
server.port=${PORT:8080}

# ── Database ────────────────────────────────────────────────────────────
# ── Database (Railway 배포 시 아래와 같이 변수화 권장) ────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/monitoring?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── QuickNode (Ethereum Only) ────────────────────────────────────────────
quicknode.ethereum.endpoint=https://alien-morning-sheet.quiknode.pro/77795dcd40bf6eb8a57269edcfc54ad4b8dd54ea/

# ── Whale Filter Threshold (ETH Only) ───────────────────────────────────
whale.eth.threshold=1000

# ── Demo Mode (실데이터 사용 시 false로 변경) ────────────────────────────
whale.demo.enabled=false

# ── QuickNode Stream Webhook 설정 ────────────────────────────────────────
# QuickNode Stream Destination URL (Railway 배포):
#   POST https://calm-elegance-production.up.railway.app/api/webhook/quicknode/eth
# Health 확인:
#   GET  https://calm-elegance-production.up.railway.app/api/webhook/quicknode/health

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
    
arkham.api.key=713a0a54-f134-48ce-a3d5-df229649ad8e
arkham.api.base-url=https://api.arkhamintelligence.com

# ── Redis (웹훅 큐잉) ────────────────────────────────────────────────────────
# Railway 배포: SPRING_DATA_REDIS_URL 환경변수가 자동 적용됨
# 로컬 개발: 환경변수 없으면 redis://localhost:6379 기본값 사용
# ── Redis (기존 방식 대신 아래 방식으로 수정 추천) ──────────────────────────
# Railway 환경 변수 이름을 직접 매핑하여 공용(Public) 주소로 연결합니다.
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.timeout=5000ms

# 만약 꼭 URL 방식을 쓰고 싶다면 Railway 환경 변수창에서 
# SPRING_DATA_REDIS_URL의 값을 REDIS_PUBLIC_URL 값으로 덮어씌워야 합니다.

# ── Whale Executor (ThreadPoolTaskExecutor) ──────────────────────────────────
whale.executor.core-pool-size=4
whale.executor.max-pool-size=8
whale.executor.queue-capacity=200

# ── Caffeine Cache (Arkham API 응답 캐싱) ────────────────────────────────────
# arkhamAddress: 주소당 최대 10,000개, 10분 TTL
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=600s
